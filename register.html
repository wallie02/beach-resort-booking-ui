<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <!-- box icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>    
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css" integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Boostrap Css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <title>Beach Resort Booking</title>
</head>
<body style="height: 1000px;">
    <div class="main-register d-flex justify-content-center align-content-center">

            <div class="card card-register my-4" style="background-color:rgb(255, 255, 255, 0.95);">
                <h3 class="title-logo-register">Shelter <sub>resort</sub></h3>
                <div class="card-title text-center">
                    <i class="fa-solid fa-umbrella-beach"></i>
                    Register Here!</div>
                <div class="card-body">
                    <form action="">
                        <div class="items my-3">
                            <label for="name" class="form-label text-muted register-label">Username</label>
                            <input type="text" id="name" class="form-control shadow-sm ps-3">
                        </div>
                        <div class="items my-3">
                            <label for="email" class="form-label text-muted register-label">Email</label>
                            <input type="email" id="email" class="form-control shadow-sm ps-3">
                        </div>
                        <div class="items my-3">
                            <label for="pass" class="form-label text-muted register-label">Password</label>
                            <input type="password" id="pass" class="form-control shadow-sm ps-3">
                        </div>
                        <div class="items my-3">
                            <label for="pass" class="form-label text-muted register-label">Confirmed Password</label>
                            <input type="password" id="pass" class="form-control shadow-sm ps-3">
                        </div>
                        <div class="items my-3">
                            <label for="phone" class="form-label text-muted register-label">Phone number</label>
                            <input type="number" id="phone" class="form-control shadow-sm ps-3">
                        </div>
                        <div class="items my-3">
                            <label for="gender" class="form-label text-muted register-label">Gender</label>
                            <select id="gender" class="form-control text-muted shadow-sm gender-register" style="border-bottom: 2px solid var(--button-color); border-radius: 10px; font-size: 13px;font-family:'Lora', serif;font-weight: 400;">
                                <option value="">Choose your gender</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                            </select>
                        </div>
                        <div class="items my-3">
                            <label for="address" class="form-label text-muted register-label">Address</label>
                            <textarea name="" id="address" cols="30" rows="3" class="form-control shadow-sm ps-3" style="border-bottom: 2px solid var(--button-color);border-radius: 10px; font-size: 13px;font-family:'Lora', serif;font-weight: 400;"></textarea>
                        </div>
                        <div class="checkbox">
                            <input type="checkbox" id="cBox" checked>
                            <lable for="cBox" style="font-family: 'Quicksand',sans-serif;">I agree all statements in <a href="#" class="text-muted">Trems of Services</a></lable>
                        </div>
                        <div class="singupBtn mt-4">
                            <button type="submit" class="btnSing btnSingup">Sing Up
                                <i class="fa-solid fa-arrow-right-to-bracket ms-1 fs-6" style="opacity: 0.8;"></i>
                            </button>
                        </div>
    
                        <p class="footer-register mt-5 text-center">Have already an account ? <a href="./login.html" class="text-muted">Login Here</a></p>
                    </form>
                </div>
            </div>
        
    </div>



</body>
<!-- Propper Boostrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
</html>
